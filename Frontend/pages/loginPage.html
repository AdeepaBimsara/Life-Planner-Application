<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>

</head>
<body>
<div class="container" id="container">

    <div class="form-container sign-up-container">

        <form>

            <h1>Sign Up</h1>

            <div class="social-container">
                <a href="#" class="social"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social"><i class="fab fa-google"></i></a>
                <a href="#" class="social"><i class="fab fa-tiktok"></i></a>
            </div>

            <span>or use your email for registration</span>

            <input type="text" placeholder="Name" id="name"/>
            <input type="email" placeholder="Email" id="email" />
            <input type="password" placeholder="Password" id="password" />

            <button id="sign-up">Sign Up</button>

        </form>

    </div>

    <div class="form-container sign-in-container">

        <form>

            <h1>Sign In</h1>

            <div class="social-container">
                <a href="#" class="social"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social"><i class="fab fa-google"></i></a>
                <a href="#" class="social"><i class="fab fa-tiktok"></i></a>
            </div>

            <span>or use your account</span>

            <input type="email" placeholder="Email" id="email-signin"/>
            <input type="password" placeholder="Password" id="password-signin" />

            <a href="pages/forget.html">Forgot your password?</a>

            <button id="sign-in">Sign In</button>

        </form>

    </div>

    <div class="overlay-container">

        <div class="overlay">

            <div class="overlay-panel overlay-left">

                <h1>Welcome to Life Planner Application!</h1>

                <p>Please login with your personal info</p>

                <button class="ghost" id="signIn">Sign In</button>

            </div>

            <div class="overlay-panel overlay-right">

                <h1>Hello, Friend!</h1>

                <p>Enter your personal details and start your journey with us</p>

                <button class="ghost" id="signUp">Sign Up</button>

            </div>

        </div>

    </div>

</div>

<script src="../js/login.js"></script>
</body>
</html>
